<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Sync | AT Protocol AppView</title>
    <!-- Modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0f19;
            --bg-surface: rgba(17, 24, 39, 0.7);
            --bg-card: rgba(31, 41, 55, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
            
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.15);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.15);
            
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-highlight: #ffffff;
            
            --glass-blur: blur(16px);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Glassmorphism Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-surface);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .logo-text {
            font-size: 1.5rem;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: var(--transition-smooth);
        }

        .nav-btn:hover, .nav-btn.active {
            color: var(--text-highlight);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-btn.active {
            box-shadow: inset 0 0 0 1px var(--border-color);
        }

        /* Container Layout */
        .container {
            max-width: 1200px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }

        /* Active Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards and Elements */
        .card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: var(--transition-smooth);
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        /* Input / Search Bar */
        .search-wrapper {
            position: relative;
            margin-bottom: 2.5rem;
        }

        .search-input {
            width: 100%;
            padding: 1.1rem 1.5rem 1.1rem 3.5rem;
            background: rgba(17, 24, 39, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            color: var(--text-highlight);
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition-smooth);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 
                0 0 0 4px var(--primary-glow),
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 1.3rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Grid Layouts */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Table Aesthetics */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .rank {
            font-weight: 800;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
        }

        .rank-1 { background: linear-gradient(135deg, #fbbf24, #d97706); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #e2e8f0, #94a3b8); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #b45309, #78350f); color: #fff; }

        /* Badges / Micro-animations */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
        }

        .badge.challenge {
            background: rgba(139, 92, 246, 0.2);
            color: #c084fc;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        /* Profile visual representation */
        .player-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .player-avatar {
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 1.25rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.2);
        }

        .player-meta h2 {
            font-size: 1.8rem;
            color: var(--text-highlight);
        }

        .player-meta p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Stats Grid inside Profile */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.25rem;
            text-align: center;
            transition: var(--transition-smooth);
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .stat-val {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-highlight);
            margin-bottom: 0.25rem;
        }

        .stat-lbl {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Loading Indicator */
        .loader {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }

        .spinner {
            width: 3rem;
            height: 3rem;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo-icon">SS</div>
            <h1 class="logo-text">SocialSync AppView</h1>
        </div>
        <nav class="nav-links">
            <button class="nav-btn active" onclick="switchTab('leaderboard')">Leaderboard</button>
            <button class="nav-btn" onclick="switchTab('achievements')">Trending achievements</button>
            <button class="nav-btn" onclick="switchTab('profiles')">Profiles</button>
        </nav>
    </header>

    <div class="container">
        <!-- Loader -->
        <div id="loader" class="loader">
            <div class="spinner"></div>
        </div>

        <!-- Leaderboard Tab -->
        <div id="tab-leaderboard" class="tab-content active">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Server Leaderboard</h2>
                    <select id="stat-selector" onchange="loadLeaderboard()" style="background: rgba(17,24,39,0.8); color: var(--text-main); border: 1px solid var(--border-color); padding: 0.5rem 1rem; border-radius: 0.5rem; outline: none; font-family: inherit;">
                        <option value="minecraft.mined.oak_log">Oak Logs Mined</option>
                        <option value="minecraft.killed.zombie">Zombies Slain</option>
                        <option value="minecraft.custom.play_one_minute">Playtime (ticks)</option>
                    </select>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 80px;">Rank</th>
                                <th>Player</th>
                                <th style="text-align: right;">Value</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Achievements Tab -->
        <div id="tab-achievements" class="tab-content">
            <div class="card">
                <h2 style="margin-bottom: 1.5rem;">Trending Achievements</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Achievement</th>
                                <th>Category</th>
                                <th>Times Earned</th>
                                <th>Recent Achievers</th>
                            </tr>
                        </thead>
                        <tbody id="achievements-body">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Profiles Tab -->
        <div id="tab-profiles" class="tab-content">
            <div class="search-wrapper">
                <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="player-search" class="search-input" placeholder="Search players by username or display name..." oninput="debounceSearch()">
            </div>
            
            <div id="search-results" class="dashboard-grid">
                <!-- Search results populate here -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE = ""; // Relative to server
        let searchTimeout;

        function switchTab(tabId) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');

            if (tabId === 'leaderboard') loadLeaderboard();
            if (tabId === 'achievements') loadTrendingAchievements();
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        async function loadLeaderboard() {
            showLoader(true);
            const selector = document.getElementById('stat-selector');
            const statType = selector.value;
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            
            try {
                const response = await fetch(`${API_BASE}/leaderboard/main-server?statType=${encodeURIComponent(statType)}`);
                const result = await response.json();
                
                if (result.success && result.data && result.data.length > 0) {
                    result.data.forEach((entry, index) => {
                        const rankNum = index + 1;
                        let rankClass = '';
                        if (rankNum === 1) rankClass = 'rank-1';
                        else if (rankNum === 2) rankClass = 'rank-2';
                        else if (rankNum === 3) rankClass = 'rank-3';
                        
                        const row = `
                            <tr>
                                <td><span class="rank ${rankClass}">${rankNum}</span></td>
                                <td style="font-weight: 600; color: var(--text-highlight);">${escapeHtml(entry.username)}</td>
                                <td style="text-align: right; font-weight: 700; color: var(--primary);">${entry.value}</td>
                            </tr>
                        `;
                        tbody.insertAdjacentHTML('beforeend', row);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-muted);">No records found. Linked players must sync stats first!</td></tr>';
                }
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #ef4444;">Failed to load leaderboard data.</td></tr>';
            } finally {
                showLoader(false);
            }
        }

        async function loadTrendingAchievements() {
            showLoader(true);
            const tbody = document.getElementById('achievements-body');
            tbody.innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/trending-achievements/main-server`);
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    result.data.forEach(entry => {
                        const row = `
                            <tr>
                                <td style="font-weight: 600; color: var(--text-highlight);">${escapeHtml(entry.achievementName)}</td>
                                <td><span class="badge ${entry.isChallenge ? 'challenge' : ''}">${escapeHtml(entry.category || 'general')}</span></td>
                                <td style="font-weight: 700; color: var(--accent);">${entry.timesEarned}</td>
                                <td style="color: var(--text-muted); font-size: 0.9rem;">${entry.recentlyEarnedBy.map(escapeHtml).join(', ')}</td>
                            </tr>
                        `;
                        tbody.insertAdjacentHTML('beforeend', row);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No achievements synced yet.</td></tr>';
                }
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #ef4444;">Failed to load achievements.</td></tr>';
            } finally {
                showLoader(false);
            }
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(performSearch, 300);
        }

        async function performSearch() {
            const query = document.getElementById('player-search').value.trim();
            const container = document.getElementById('search-results');
            container.innerHTML = '';
            
            if (query.length < 2) return;
            showLoader(true);

            try {
                const response = await fetch(`${API_BASE}/search?username=${encodeURIComponent(query)}`);
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    for (const profile of result.data) {
                        const profileCard = document.createElement('div');
                        profileCard.className = 'card';
                        profileCard.style.cursor = 'pointer';
                        profileCard.innerHTML = `
                            <div class="player-header">
                                <div class="player-avatar">${escapeHtml(profile.username.substring(0, 2).toUpperCase())}</div>
                                <div class="player-meta">
                                    <h2>${escapeHtml(profile.displayName || profile.username)}</h2>
                                    <p>@${escapeHtml(profile.username)}</p>
                                </div>
                            </div>
                            <p style="color: var(--text-muted); line-height: 1.5; min-height: 3rem;">${escapeHtml(profile.bio || "No biography provided.")}</p>
                            <div class="stats-grid" id="stats-${profile.playerUuid}">
                                <div class="loader-small" style="text-align: center; grid-column: span 3; padding: 1rem; color: var(--text-muted);">Loading stats summary...</div>
                            </div>
                        `;
                        container.appendChild(profileCard);
                        loadPlayerStatsSummary(profile.playerUuid);
                    }
                } else {
                    container.innerHTML = '<div style="grid-column: span 2; text-align: center; padding: 2rem; color: var(--text-muted);">No players matched search query.</div>';
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div style="grid-column: span 2; text-align: center; padding: 2rem; color: #ef4444;">Error fetching player profiles.</div>';
            } finally {
                showLoader(false);
            }
        }

        async function loadPlayerStatsSummary(uuid) {
            const statsContainer = document.getElementById(`stats-${uuid}`);
            try {
                const response = await fetch(`${API_BASE}/stats-summary/${uuid}`);
                const result = await response.json();
                
                if (result.success && result.data) {
                    const data = result.data;
                    statsContainer.innerHTML = `
                        <div class="stat-card">
                            <div class="stat-val">${data.playtimeMinutes}m</div>
                            <div class="stat-lbl">Playtime</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val">${data.level}</div>
                            <div class="stat-lbl">Level</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val">${escapeHtml(data.gamemode || "survival")}</div>
                            <div class="stat-lbl">Gamemode</div>
                        </div>
                    `;
                } else {
                    statsContainer.innerHTML = '<div style="grid-column: span 3; text-align: center; color: var(--text-muted); font-size: 0.9rem; padding: 0.5rem 0;">No stats records synced yet.</div>';
                }
            } catch (err) {
                console.error(err);
                statsContainer.innerHTML = '<div style="grid-column: span 3; text-align: center; color: #ef4444; font-size: 0.9rem; padding: 0.5rem 0;">Failed to load stats.</div>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadLeaderboard();
        });
    </script>
</body>
</html>
